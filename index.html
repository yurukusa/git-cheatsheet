<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .back-link {
    color: var(--text2);
    text-decoration: none;
    font-size: 13px;
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--accent); }

  h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .git-icon {
    width: 24px;
    height: 24px;
    background: var(--red);
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 900;
    color: #fff;
    flex-shrink: 0;
  }

  .count-badge {
    background: var(--border);
    color: var(--text2);
    border-radius: 12px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 600;
  }

  .count-badge .filtered { color: var(--accent); }

  .search-wrap {
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text2);
    font-size: 14px;
    pointer-events: none;
  }

  #search {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 9px 14px 9px 36px;
    font-size: 14px;
    width: 320px;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text2); }

  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d1117;
  }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
  }

  .section-header {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text2);
    margin: 32px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-header .cat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .card.copied { border-color: var(--green); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .danger-badge {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 7px;
    border-radius: 4px;
  }
  .danger-safe { background: rgba(63,185,80,0.15); color: var(--green); }
  .danger-caution { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .danger-destructive { background: rgba(248,81,73,0.15); color: var(--red); }

  .cmd-syntax {
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', 'Monaco', monospace;
    font-size: 13px;
    color: var(--accent);
    background: rgba(88,166,255,0.08);
    padding: 6px 10px;
    border-radius: 6px;
    border-left: 3px solid var(--accent);
    word-break: break-all;
    line-height: 1.5;
  }

  .cmd-desc {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
  }

  .examples {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .example {
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', 'Monaco', monospace;
    font-size: 11.5px;
    color: var(--text2);
    background: var(--bg);
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    word-break: break-all;
    line-height: 1.5;
  }
  .example::before { content: '$ '; color: var(--green); }

  .copy-hint {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--green);
    color: #0d1117;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    padding: 4px;
    transform: translateY(100%);
    transition: transform 0.2s;
    border-radius: 0 0 8px 8px;
  }
  .card.copied .copy-hint { transform: translateY(0); }

  .no-results {
    text-align: center;
    color: var(--text2);
    padding: 60px 24px;
    font-size: 14px;
    display: none;
  }
  .no-results.visible { display: block; }
  .no-results span { font-size: 32px; display: block; margin-bottom: 12px; }

  .cat-setup { color: #79c0ff; }
  .cat-basics { color: var(--green); }
  .cat-branching { color: #d2a8ff; }
  .cat-remote { color: var(--accent); }
  .cat-stash { color: var(--yellow); }
  .cat-log { color: #ffa657; }
  .cat-undo { color: var(--red); }
  .cat-advanced { color: #f0883e; }

  .dot-setup { background: #79c0ff; }
  .dot-basics { background: var(--green); }
  .dot-branching { background: #d2a8ff; }
  .dot-remote { background: var(--accent); }
  .dot-stash { background: var(--yellow); }
  .dot-log { background: #ffa657; }
  .dot-undo { background: var(--red); }
  .dot-advanced { background: #f0883e; }

  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    main { padding: 16px; }
    #search { width: 100%; }
    .header-top { flex-direction: column; align-items: flex-start; }
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-left">
      <a href="https://yurukusa.github.io/dev-toolkit/" class="back-link">← Dev Toolkit</a>
      <h1><span class="git-icon">G</span> Git Cheatsheet</h1>
      <span class="count-badge"><span class="filtered" id="filtered-count">0</span> / <span id="total-count">0</span> commands</span>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Search commands, descriptions…" autocomplete="off" spellcheck="false">
    </div>
  </div>
  <div class="filter-row">
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="setup">Setup</button>
    <button class="filter-btn" data-cat="basics">Basics</button>
    <button class="filter-btn" data-cat="branching">Branching</button>
    <button class="filter-btn" data-cat="remote">Remote</button>
    <button class="filter-btn" data-cat="stash">Stash</button>
    <button class="filter-btn" data-cat="log">Log</button>
    <button class="filter-btn" data-cat="undo">Undo</button>
    <button class="filter-btn" data-cat="advanced">Advanced</button>
  </div>
</header>

<main id="main">
  <div class="no-results" id="no-results">
    <span>🔍</span>
    No commands found. Try a different search term.
  </div>
</main>

<script>
const COMMANDS = [
  // SETUP
  {
    cat: 'setup',
    cmd: 'git config --global user.name "<name>"',
    desc: 'Set your Git username globally (used in all commits).',
    danger: 'safe',
    examples: ['git config --global user.name "Alice Smith"']
  },
  {
    cat: 'setup',
    cmd: 'git config --global user.email "<email>"',
    desc: 'Set your Git email globally (used in all commits).',
    danger: 'safe',
    examples: ['git config --global user.email "alice@example.com"']
  },
  {
    cat: 'setup',
    cmd: 'git config --list',
    desc: 'Display all Git configuration settings currently in effect.',
    danger: 'safe',
    examples: ['git config --list', 'git config --list --global']
  },
  {
    cat: 'setup',
    cmd: 'git config --global core.editor "<editor>"',
    desc: 'Set the default text editor Git opens for commit messages.',
    danger: 'safe',
    examples: ['git config --global core.editor "vim"', 'git config --global core.editor "code --wait"']
  },
  {
    cat: 'setup',
    cmd: 'git init',
    desc: 'Initialize a new Git repository in the current directory.',
    danger: 'safe',
    examples: ['git init', 'git init my-project']
  },
  {
    cat: 'setup',
    cmd: 'git clone <url>',
    desc: 'Clone a remote repository into a new local directory.',
    danger: 'safe',
    examples: ['git clone https://github.com/user/repo.git', 'git clone git@github.com:user/repo.git my-dir']
  },
  {
    cat: 'setup',
    cmd: 'git clone --depth <n> <url>',
    desc: 'Shallow clone — only download the last N commits (faster for large repos).',
    danger: 'safe',
    examples: ['git clone --depth 1 https://github.com/user/repo.git']
  },

  // BASICS
  {
    cat: 'basics',
    cmd: 'git status',
    desc: 'Show the working tree status: staged, unstaged, and untracked files.',
    danger: 'safe',
    examples: ['git status', 'git status -s']
  },
  {
    cat: 'basics',
    cmd: 'git add <file>',
    desc: 'Stage a specific file for the next commit.',
    danger: 'safe',
    examples: ['git add README.md', 'git add src/index.js']
  },
  {
    cat: 'basics',
    cmd: 'git add .',
    desc: 'Stage all changes in the current directory and subdirectories.',
    danger: 'caution',
    examples: ['git add .', 'git add -A']
  },
  {
    cat: 'basics',
    cmd: 'git add -p',
    desc: 'Interactively stage hunks — choose exactly which changes to include.',
    danger: 'safe',
    examples: ['git add -p', 'git add --patch src/app.js']
  },
  {
    cat: 'basics',
    cmd: 'git commit -m "<message>"',
    desc: 'Record staged changes with a commit message.',
    danger: 'safe',
    examples: ['git commit -m "feat: add login page"', 'git commit -m "fix: resolve null pointer"']
  },
  {
    cat: 'basics',
    cmd: 'git commit --amend',
    desc: 'Modify the most recent commit (message or staged content). Do not amend pushed commits.',
    danger: 'caution',
    examples: ['git commit --amend -m "corrected message"', 'git commit --amend --no-edit']
  },
  {
    cat: 'basics',
    cmd: 'git diff',
    desc: 'Show unstaged changes between working tree and index.',
    danger: 'safe',
    examples: ['git diff', 'git diff src/app.js']
  },
  {
    cat: 'basics',
    cmd: 'git diff --staged',
    desc: 'Show staged changes that will go into the next commit.',
    danger: 'safe',
    examples: ['git diff --staged', 'git diff --cached']
  },
  {
    cat: 'basics',
    cmd: 'git diff <branch1>..<branch2>',
    desc: 'Show differences between two branches.',
    danger: 'safe',
    examples: ['git diff main..feature/login', 'git diff HEAD~3..HEAD']
  },
  {
    cat: 'basics',
    cmd: 'git rm <file>',
    desc: 'Remove a file from both the working tree and the index.',
    danger: 'caution',
    examples: ['git rm obsolete.txt', 'git rm --cached secret.env']
  },
  {
    cat: 'basics',
    cmd: 'git mv <old> <new>',
    desc: 'Move or rename a file and stage the change.',
    danger: 'safe',
    examples: ['git mv old-name.js new-name.js', 'git mv src/util.js lib/util.js']
  },

  // BRANCHING
  {
    cat: 'branching',
    cmd: 'git branch',
    desc: 'List all local branches. The current branch is marked with *.',
    danger: 'safe',
    examples: ['git branch', 'git branch -a']
  },
  {
    cat: 'branching',
    cmd: 'git branch <name>',
    desc: 'Create a new branch at the current HEAD (without switching to it).',
    danger: 'safe',
    examples: ['git branch feature/auth', 'git branch hotfix/bug-123']
  },
  {
    cat: 'branching',
    cmd: 'git switch <branch>',
    desc: 'Switch to an existing branch (modern replacement for checkout).',
    danger: 'safe',
    examples: ['git switch main', 'git switch feature/auth']
  },
  {
    cat: 'branching',
    cmd: 'git switch -c <branch>',
    desc: 'Create and switch to a new branch in one step.',
    danger: 'safe',
    examples: ['git switch -c feature/dashboard', 'git switch -c hotfix/null-check']
  },
  {
    cat: 'branching',
    cmd: 'git checkout <branch>',
    desc: 'Switch branches (classic command — prefer git switch for clarity).',
    danger: 'safe',
    examples: ['git checkout main', 'git checkout -b feature/api']
  },
  {
    cat: 'branching',
    cmd: 'git branch -d <branch>',
    desc: 'Delete a branch (only if fully merged). Use -D to force delete.',
    danger: 'caution',
    examples: ['git branch -d feature/done', 'git branch -D feature/abandoned']
  },
  {
    cat: 'branching',
    cmd: 'git merge <branch>',
    desc: 'Merge the specified branch into the current branch.',
    danger: 'caution',
    examples: ['git merge feature/login', 'git merge --no-ff feature/login']
  },
  {
    cat: 'branching',
    cmd: 'git merge --squash <branch>',
    desc: 'Squash all commits from branch into a single staged change (does not auto-commit).',
    danger: 'caution',
    examples: ['git merge --squash feature/messy-history']
  },
  {
    cat: 'branching',
    cmd: 'git rebase <branch>',
    desc: 'Reapply commits on top of another branch. Rewrites history — do not rebase shared branches.',
    danger: 'destructive',
    examples: ['git rebase main', 'git rebase -i HEAD~3']
  },
  {
    cat: 'branching',
    cmd: 'git rebase --abort',
    desc: 'Abort an in-progress rebase and return to the original state.',
    danger: 'caution',
    examples: ['git rebase --abort']
  },

  // REMOTE
  {
    cat: 'remote',
    cmd: 'git remote -v',
    desc: 'List all remote connections with their URLs.',
    danger: 'safe',
    examples: ['git remote -v']
  },
  {
    cat: 'remote',
    cmd: 'git remote add <name> <url>',
    desc: 'Add a new remote connection under the given name.',
    danger: 'safe',
    examples: ['git remote add origin https://github.com/user/repo.git', 'git remote add upstream https://github.com/original/repo.git']
  },
  {
    cat: 'remote',
    cmd: 'git remote remove <name>',
    desc: 'Remove a remote connection.',
    danger: 'caution',
    examples: ['git remote remove origin']
  },
  {
    cat: 'remote',
    cmd: 'git fetch <remote>',
    desc: 'Download changes from remote without merging into local branches.',
    danger: 'safe',
    examples: ['git fetch origin', 'git fetch --all']
  },
  {
    cat: 'remote',
    cmd: 'git pull',
    desc: 'Fetch and integrate changes from the tracked remote branch.',
    danger: 'caution',
    examples: ['git pull', 'git pull --rebase origin main']
  },
  {
    cat: 'remote',
    cmd: 'git push <remote> <branch>',
    desc: 'Upload local branch commits to the remote repository.',
    danger: 'safe',
    examples: ['git push origin main', 'git push -u origin feature/auth']
  },
  {
    cat: 'remote',
    cmd: 'git push --force-with-lease',
    desc: 'Force-push but fail if the remote has commits you have not fetched (safer than --force).',
    danger: 'destructive',
    examples: ['git push --force-with-lease origin feature/rebase']
  },
  {
    cat: 'remote',
    cmd: 'git push origin --delete <branch>',
    desc: 'Delete a remote branch.',
    danger: 'destructive',
    examples: ['git push origin --delete feature/old']
  },

  // STASH
  {
    cat: 'stash',
    cmd: 'git stash',
    desc: 'Save uncommitted changes (staged and unstaged) to the stash stack.',
    danger: 'safe',
    examples: ['git stash', 'git stash push -m "WIP: login form"']
  },
  {
    cat: 'stash',
    cmd: 'git stash pop',
    desc: 'Apply the most recent stash and remove it from the stash stack.',
    danger: 'caution',
    examples: ['git stash pop', 'git stash pop stash@{2}']
  },
  {
    cat: 'stash',
    cmd: 'git stash apply',
    desc: 'Apply the most recent stash without removing it from the stack.',
    danger: 'safe',
    examples: ['git stash apply', 'git stash apply stash@{1}']
  },
  {
    cat: 'stash',
    cmd: 'git stash list',
    desc: 'Show all stashes in the stash stack.',
    danger: 'safe',
    examples: ['git stash list']
  },
  {
    cat: 'stash',
    cmd: 'git stash drop <stash>',
    desc: 'Delete a specific stash entry from the stack.',
    danger: 'caution',
    examples: ['git stash drop stash@{0}', 'git stash clear']
  },
  {
    cat: 'stash',
    cmd: 'git stash show -p',
    desc: 'Show the diff of the most recent stash as a patch.',
    danger: 'safe',
    examples: ['git stash show -p', 'git stash show -p stash@{1}']
  },

  // LOG
  {
    cat: 'log',
    cmd: 'git log',
    desc: 'Show the commit history for the current branch.',
    danger: 'safe',
    examples: ['git log', 'git log --author="Alice"']
  },
  {
    cat: 'log',
    cmd: 'git log --oneline',
    desc: 'Show condensed one-line commit history.',
    danger: 'safe',
    examples: ['git log --oneline', 'git log --oneline -20']
  },
  {
    cat: 'log',
    cmd: 'git log --oneline --graph --all',
    desc: 'Visualize the full branch history as an ASCII graph.',
    danger: 'safe',
    examples: ['git log --oneline --graph --all', 'git log --graph --decorate --all']
  },
  {
    cat: 'log',
    cmd: 'git log -p <file>',
    desc: 'Show commit history and full diffs for a specific file.',
    danger: 'safe',
    examples: ['git log -p src/app.js', 'git log --follow -p README.md']
  },
  {
    cat: 'log',
    cmd: 'git shortlog -sn',
    desc: 'Summarize commit count per author, sorted by number of commits.',
    danger: 'safe',
    examples: ['git shortlog -sn', 'git shortlog -sn --all']
  },
  {
    cat: 'log',
    cmd: 'git reflog',
    desc: 'Show a log of all HEAD movements — useful for recovering lost commits.',
    danger: 'safe',
    examples: ['git reflog', 'git reflog --relative-date']
  },
  {
    cat: 'log',
    cmd: 'git log --since=<date> --until=<date>',
    desc: 'Filter commits by date range.',
    danger: 'safe',
    examples: ['git log --since="2024-01-01" --until="2024-12-31"', 'git log --since="2 weeks ago"']
  },

  // UNDO
  {
    cat: 'undo',
    cmd: 'git restore <file>',
    desc: 'Discard unstaged changes in a file and restore to last commit.',
    danger: 'destructive',
    examples: ['git restore src/app.js', 'git restore .']
  },
  {
    cat: 'undo',
    cmd: 'git restore --staged <file>',
    desc: 'Unstage a file (remove from index) while keeping working tree changes.',
    danger: 'safe',
    examples: ['git restore --staged secret.env', 'git restore --staged .']
  },
  {
    cat: 'undo',
    cmd: 'git revert <commit>',
    desc: 'Create a new commit that undoes the changes of a specific commit. Safe for shared history.',
    danger: 'caution',
    examples: ['git revert HEAD', 'git revert abc1234']
  },
  {
    cat: 'undo',
    cmd: 'git reset --soft HEAD~<n>',
    desc: 'Move HEAD back N commits, keeping changes staged. Good for re-committing.',
    danger: 'caution',
    examples: ['git reset --soft HEAD~1', 'git reset --soft HEAD~3']
  },
  {
    cat: 'undo',
    cmd: 'git reset --mixed HEAD~<n>',
    desc: 'Move HEAD back N commits, unstaging changes but keeping files.',
    danger: 'caution',
    examples: ['git reset HEAD~2', 'git reset --mixed HEAD~1']
  },
  {
    cat: 'undo',
    cmd: 'git reset --hard HEAD~<n>',
    desc: 'Move HEAD back N commits and discard all changes. Permanent data loss.',
    danger: 'destructive',
    examples: ['git reset --hard HEAD~1', 'git reset --hard origin/main']
  },
  {
    cat: 'undo',
    cmd: 'git clean -fd',
    desc: 'Remove untracked files and directories. Permanent — cannot be recovered.',
    danger: 'destructive',
    examples: ['git clean -fd', 'git clean -fdn']
  },

  // ADVANCED
  {
    cat: 'advanced',
    cmd: 'git cherry-pick <commit>',
    desc: 'Apply the changes from a specific commit onto the current branch.',
    danger: 'caution',
    examples: ['git cherry-pick abc1234', 'git cherry-pick abc1234..def5678']
  },
  {
    cat: 'advanced',
    cmd: 'git bisect start',
    desc: 'Start binary search to find the commit that introduced a bug.',
    danger: 'safe',
    examples: ['git bisect start', 'git bisect bad', 'git bisect good v1.0']
  },
  {
    cat: 'advanced',
    cmd: 'git blame <file>',
    desc: 'Show which commit and author last modified each line of a file.',
    danger: 'safe',
    examples: ['git blame src/auth.js', 'git blame -L 10,30 src/auth.js']
  },
  {
    cat: 'advanced',
    cmd: 'git tag <name>',
    desc: 'Create a lightweight tag at the current commit.',
    danger: 'safe',
    examples: ['git tag v1.0.0', 'git tag -a v1.0.0 -m "Release 1.0.0"']
  },
  {
    cat: 'advanced',
    cmd: 'git worktree add <path> <branch>',
    desc: 'Check out a branch into a separate directory without switching branches.',
    danger: 'safe',
    examples: ['git worktree add ../hotfix hotfix/critical', 'git worktree list']
  },
  {
    cat: 'advanced',
    cmd: 'git submodule add <url>',
    desc: 'Add another Git repository as a submodule inside the current repo.',
    danger: 'caution',
    examples: ['git submodule add https://github.com/lib/tool.git libs/tool', 'git submodule update --init --recursive']
  },
  {
    cat: 'advanced',
    cmd: 'git stash branch <branch>',
    desc: 'Create a new branch from the commit where a stash was created, then apply the stash.',
    danger: 'safe',
    examples: ['git stash branch feature/from-stash']
  },
  {
    cat: 'advanced',
    cmd: 'git grep "<pattern>"',
    desc: 'Search for a pattern in the working tree or in commits.',
    danger: 'safe',
    examples: ['git grep "TODO"', 'git grep -n "function auth"']
  },
  {
    cat: 'advanced',
    cmd: 'git archive --format=zip HEAD > out.zip',
    desc: 'Export the current HEAD as a zip archive (no .git directory).',
    danger: 'safe',
    examples: ['git archive --format=zip HEAD > release.zip', 'git archive --format=tar HEAD | gzip > release.tar.gz']
  },
  {
    cat: 'advanced',
    cmd: 'git rerere',
    desc: 'Reuse recorded resolutions — Git remembers how you resolved merge conflicts.',
    danger: 'safe',
    examples: ['git config --global rerere.enabled true', 'git rerere status']
  }
];

// DOM references
const searchInput = document.getElementById('search');
const mainEl = document.getElementById('main');
const noResults = document.getElementById('no-results');
const filteredCountEl = document.getElementById('filtered-count');
const totalCountEl = document.getElementById('total-count');
const filterBtns = document.querySelectorAll('.filter-btn');

totalCountEl.textContent = COMMANDS.length;

let activeCategory = 'all';
let searchQuery = '';

const CATEGORY_COLORS = {
  setup: { text: 'cat-setup', dot: 'dot-setup' },
  basics: { text: 'cat-basics', dot: 'dot-basics' },
  branching: { text: 'cat-branching', dot: 'dot-branching' },
  remote: { text: 'cat-remote', dot: 'dot-remote' },
  stash: { text: 'cat-stash', dot: 'dot-stash' },
  log: { text: 'cat-log', dot: 'dot-log' },
  undo: { text: 'cat-undo', dot: 'dot-undo' },
  advanced: { text: 'cat-advanced', dot: 'dot-advanced' }
};

const CATEGORY_LABELS = {
  setup: 'Setup',
  basics: 'Basics',
  branching: 'Branching',
  remote: 'Remote',
  stash: 'Stash',
  log: 'Log',
  undo: 'Undo',
  advanced: 'Advanced'
};

const CATEGORIES_ORDER = ['setup', 'basics', 'branching', 'remote', 'stash', 'log', 'undo', 'advanced'];

function filterCommands() {
  const q = searchQuery.toLowerCase();
  return COMMANDS.filter(cmd => {
    const matchCat = activeCategory === 'all' || cmd.cat === activeCategory;
    const matchSearch = !q ||
      cmd.cmd.toLowerCase().includes(q) ||
      cmd.desc.toLowerCase().includes(q) ||
      cmd.examples.some(e => e.toLowerCase().includes(q)) ||
      cmd.cat.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
}

function createCard(cmd) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.cmd = cmd.cmd;

  const examplesHTML = cmd.examples.map(e =>
    `<div class="example">${escapeHtml(e)}</div>`
  ).join('');

  card.innerHTML = `
    <div class="card-top">
      <code class="cmd-syntax">${escapeHtml(cmd.cmd)}</code>
      <span class="danger-badge danger-${cmd.danger}">${cmd.danger}</span>
    </div>
    <p class="cmd-desc">${escapeHtml(cmd.desc)}</p>
    <div class="examples">${examplesHTML}</div>
    <div class="copy-hint">Copied!</div>
  `;

  card.addEventListener('click', () => copyCommand(cmd.cmd, card));
  return card;
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function copyCommand(cmd, card) {
  // Extract base command (without angle bracket placeholders)
  navigator.clipboard.writeText(cmd).then(() => {
    card.classList.add('copied');
    setTimeout(() => card.classList.remove('copied'), 1500);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = cmd;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    card.classList.add('copied');
    setTimeout(() => card.classList.remove('copied'), 1500);
  });
}

function render() {
  // Clear main (but keep no-results)
  const sections = mainEl.querySelectorAll('.section-block');
  sections.forEach(s => s.remove());

  const filtered = filterCommands();
  filteredCountEl.textContent = filtered.length;

  if (filtered.length === 0) {
    noResults.classList.add('visible');
    return;
  }
  noResults.classList.remove('visible');

  const grouped = {};
  CATEGORIES_ORDER.forEach(cat => { grouped[cat] = []; });
  filtered.forEach(cmd => {
    if (grouped[cmd.cat]) grouped[cmd.cat].push(cmd);
  });

  CATEGORIES_ORDER.forEach(cat => {
    const items = grouped[cat];
    if (!items || items.length === 0) return;

    const block = document.createElement('div');
    block.className = 'section-block';

    const colors = CATEGORY_COLORS[cat];
    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `<span class="cat-dot ${colors.dot}"></span><span class="${colors.text}">${CATEGORY_LABELS[cat]}</span>`;

    const grid = document.createElement('div');
    grid.className = 'cards-grid';
    items.forEach(cmd => grid.appendChild(createCard(cmd)));

    block.appendChild(header);
    block.appendChild(grid);
    mainEl.insertBefore(block, noResults);
  });
}

// Event listeners
searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value;
  render();
});

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    activeCategory = btn.dataset.cat;
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// Keyboard shortcut: / to focus search
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape') {
    searchInput.blur();
  }
});

// Initial render
render();
</script>
